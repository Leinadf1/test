<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>UHD TV Multi-Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 1200px;
        }
        select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #333;
            color: white;
            border: 2px solid #ff9000;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #video-container {
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        h1 {
            color: #ff9000;
            font-size: 24px;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        button {
            background: #ff9000;
            border: none;
            padding: 8px 15px;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .error-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 2px solid red;
            border-radius: 8px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Multi-Stream UHD Player</h1>

    <div class="top-bar">
        <button onclick="manualRefresh()">Refresh ora</button>
    </div>

    <select id="streamSelector">
        <option value="eurosport4k">EUROSPORT 4K</option>
        <option value="f1">SKY SPORTS F1 UHD</option>
        <option value="sports1">SKY SPORTS 1 UHD</option>
        <option value="sports2">SKY SPORTS 2 UHD</option>
        <option value="mainevent">SKY SPORTS MAIN EVENT UHD</option>
        <option value="tnt">TNT SPORTS ULTIMATE UHD</option>
    </select>

    <div id="video-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video" style="width:100%;height:100%"></video>
        <div id="error-overlay" class="error-overlay">
            <p>⚠️ Riproduzione bloccata.</p>
            <p style="font-size:14px;">Tentativo di ripristino in corso... se non funziona, la pagina verrà ricaricata.</p>
        </div>
    </div>
</div>

<script>
    const streams = {
        eurosport4k: {
            manifest: 'https://eurosport-proxy.onrender.com/eurosport4k/manifest.mpd',
            keys: {"9ceae06c6ad34aada83ba86c0b511452":"406862beb4af1ef8fe04ba15d9936360","fcd924bd2e45470fa2ae50ef05e357c0":"266db84d3572bc889185274a90ff31df","dea135e33341468f8a4e8da806d8a6e6":"fb7423db39e6fab75056f8c83f415847","31911db90ee3410f8b38e45659d01fb1":"ac316ab7dfd2b50faf6d44633e4fedd5","a16f2a39adbb4974b8910cec8a651a09":"c2d55e0111af955f47214af209a2c468"}
        },
        f1: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777711547_s~7d601a3c-76ec-4aec-940c-8c9fb7fadffd_u~391d2014ab0c633697fb1b3a46f47dfaf28470e414b6aaafb672438c19a94fc021fcb3dc21d6ad645d044df1ab39f0a3_l~60_x~12eeddf9c3adaeb3016040c0e8078deb1ad075a319231d69eab2274b0c992a3e/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsf1uhd)/master_2hr-all.mpd',
            keys: {"111cd3cd3a27a8c0aaa40d9d7815bb33": "1d13d440ab29ab027de9843ecf62facf", "111c5b96024c2a58fbc980905a0b3c73": "07ec005ab99cb0fbbce1c4d913fd941e"}
        },
        sports1: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218154_s~265f79d4-ed37-45b5-b134-a8711e75f926_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~59_x~93516c54e940660ebfb063532a82f95f95f640fa22df0e20ec4f1c763ce3b094/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skyuhdsports1)/master_2hr-all.mpd',
            keys: {"111cfb5bb437ce65bd71a0421bd2a4cf": "7c09158574cf900b64bbeb1fa6be8b64", "111c3801c329b61c7b03872eee20073c": "8506cfd7504dfaab5cc9dcd83f3c223c"}
        },
        sports2: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218149_s~df50d4a7-fff5-42a3-a2a9-02b5d680bf19_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~59_x~aa349eba73f552f9b3e4769850376ba6f2cfdafa9a1c9f5f5e6c80352fd41048/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skyuhdsports2)/master_2hr-all.mpd',
            keys: {"111c16b39b650523d7a51c07eedeef01": "87b8223de40e047a10f094d3eb02dd55", "111c5ab918fc0f7d4ed948f1e1c08846": "d61325e9bd5f38bce8503f3f11602f44"}
        },
        mainevent: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1778486282_s~a8ad9f1a-e163-4d94-b2e5-1841a3cd911c_u~3e447b32158e09dcd5ce2ee9f7cf1cb7265d39219764d876d6c533f5955119fc3facea1ae472f8a8fd9bbda0da653a27_l~67_x~d20eb898c0ed406558ab5267b92e2fc0fb4634a01b97588038b4231fca556176/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsmaineventuhd)/master_2hr-all.mpd',
            keys: {"111c25e7e37846b06c9b87f62658546e": "d30ab65c372dac38af450625169da171", "111ce0170cba6d5b3692f5b0d433e582": "74869e833e9d984df1a0d4954559187a"}
        },
        tnt: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1780242390_s~2a289cfc-6fe2-4e2c-a145-7fabc9ae84f0_u~67cff13cc551280a9e82c32fbfe589d837d692d699572fc6ef5fdceef7afb934_l~65_x~c37847153205a3f72c7cfa415b9e7bea311e53755b93ec03d0db1cf648a71221/nowgblin2/Content/CMAF_CTR_D1/Live/channel(tntsportultimateuhd)/master_2hr-all.mpd',
            keys: {"111c333e3f2dadd6cb768860aa2731f4": "cff0a15f60b2f8fc3f7132f4653dd0c1", "111c500455c487ee6d06e1ee200f2f4b": "b78ee5bd8398bd194b8f511ae39102fb"}
        }
    };

    let player;
    let currentStreamKey = 'eurosport4k';
    let stallCheckInterval = null;
    let isLoading = false;
    let recoveryAttempts = 0;
    let lastRecoveryTime = 0;

    // Backoff crescente tra i tentativi
    function getBackoffDelay() {
        return Math.min(2000 * Math.pow(2, recoveryAttempts), 15000);
    }

    function resetRecoveryCounter() {
        recoveryAttempts = 0;
        lastRecoveryTime = 0;
    }

    function showErrorOverlay(show) {
        document.getElementById('error-overlay').style.display = show ? 'block' : 'none';
    }

    // Watchdog: se il video rimane bloccato per più di 15 secondi, tenta recupero
    function startStallWatchdog(video, streamKey) {
        if (stallCheckInterval) clearInterval(stallCheckInterval);
        let lastTime = video.currentTime;
        let stallStart = null;

        stallCheckInterval = setInterval(() => {
            if (isLoading) return;
            if (video.paused || video.ended) return;

            const now = video.currentTime;
            if (now === lastTime) {
                if (!stallStart) stallStart = Date.now();
                else if (Date.now() - stallStart > 15000) {
                    console.warn('Stallo rilevato (>15s). Avvio recupero...');
                    stallStart = null;
                    attemptRecovery(streamKey);
                }
            } else {
                lastTime = now;
                stallStart = null;
            }
        }, 5000);
    }

    // Tentativo di recupero: se dopo 3 fallimenti non riparte, ricarica la pagina
    async function attemptRecovery(streamKey) {
        const now = Date.now();

        // Troppi tentativi nell'ultimo minuto → ultima spiaggia
        if (now - lastRecoveryTime < 60000 && recoveryAttempts >= 3) {
            console.error("Impossibile recuperare in pagina. Ricarico l'intera pagina...");
            sessionStorage.setItem('lastChannel', currentStreamKey);
            location.reload();
            return;
        }

        recoveryAttempts++;
        lastRecoveryTime = now;
        isLoading = true;

        const backoff = getBackoffDelay();
        console.log(`Tentativo recupero #${recoveryAttempts} tra ${backoff/1000}s...`);
        showErrorOverlay(true);
        await new Promise(r => setTimeout(r, backoff));

        try {
            await player.unload();
        } catch (e) {
            console.warn("Unload fallito, proseguo comunque:", e);
        }

        try {
            await loadStream(streamKey, true);
            console.log("Recupero riuscito!");
            resetRecoveryCounter();
            showErrorOverlay(false);
        } catch (e) {
            console.error("Recupero fallito:", e);
            // Riprova fino a 3 tentativi totali, poi la prossima volta ricaricherà la pagina
            if (recoveryAttempts < 3) {
                setTimeout(() => attemptRecovery(streamKey), 5000);
            } else {
                // Siamo già al terzo fallimento: lascia il messaggio e poi dopo 5 secondi ricarica
                showErrorOverlay(true);
                setTimeout(() => {
                    sessionStorage.setItem('lastChannel', currentStreamKey);
                    location.reload();
                }, 5000);
            }
        } finally {
            isLoading = false;
        }
    }

    // Carica lo stream (con flag di recupero)
    async function loadStream(streamKey, isRecovery = false) {
        if (isLoading && !isRecovery) {
            console.warn("Caricamento già in corso, ignoro.");
            return;
        }
        isLoading = true;
        currentStreamKey = streamKey;
        const stream = streams[streamKey];

        // Configurazione bilanciata: buffer ampio per fluidità, senza sync forzata
        player.configure({
            drm: {
                clearKeys: stream.keys,
                advanced: {
                    'org.w3.org.clearkey': {
                        'videoRobustness': '',
                        'audioRobustness': ''
                    }
                }
            },
            manifest: {
                dash: {
                    ignoreMinBufferTime: true,
                    autoCorrectTiming: true
                },
                updatePeriod: 5
            },
            streaming: {
                bufferingGoal: 25,
                rebufferingGoal: 8,
                safeInSeconds: 10,
                stallThreshold: 4,
                maxNumFailures: 15,
                failureCallback: function(error) {
                    console.warn("Segmento fallito, ritento...", error);
                    player.retry();
                }
            },
            abr: {
                enabled: true,
                switchInterval: 5,
                restrictions: {
                    minHeight: 360
                }
            }
        });

        try {
            await player.load(stream.manifest);
            console.log("Caricato:", streamKey);

            const video = document.getElementById('video');
            startStallWatchdog(video, streamKey);
            if (!isRecovery) resetRecoveryCounter();
            showErrorOverlay(false);
        } catch (e) {
            console.error("Errore caricamento:", e);
            if (!isRecovery) {
                // Primo tentativo fallito, avvia recupero
                attemptRecovery(streamKey);
            } else {
                throw e; // rilancia per far gestire a attemptRecovery
            }
        } finally {
            isLoading = false;
        }
    }

    function manualRefresh() {
        sessionStorage.setItem('lastChannel', currentStreamKey);
        location.reload();
    }

    function restoreLastChannel() {
        const last = sessionStorage.getItem('lastChannel');
        if (last && streams[last]) {
            document.getElementById('streamSelector').value = last;
            return last;
        }
        return 'eurosport4k';
    }

    async function init() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        player = controls.getPlayer();

        // Errore critico (3016) → tenta recupero
        player.addEventListener('error', async (event) => {
            const error = event.detail;
            if (error.code === 3016 || error.code === 244002) {
                console.warn("Errore critico, avvio recupero...");
                attemptRecovery(currentStreamKey);
            }
        });

        // Overlay cliccabile per forzare refresh
        document.getElementById('error-overlay').addEventListener('click', () => {
            manualRefresh();
        });

        // Cambio canale
        document.getElementById('streamSelector').addEventListener('change', (e) => {
            resetRecoveryCounter();
            showErrorOverlay(false);
            loadStream(e.target.value);
        });

        const startChannel = restoreLastChannel();
        await loadStream(startChannel);
        sessionStorage.removeItem('lastChannel');
    }

    document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
