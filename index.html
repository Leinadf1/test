<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>UHD TV Multi-Player - Eurosport 4K Optimized</title>
    <!-- Aggiornato a Shaka Player v5.0.5 per massima stabilitÃ  con flussi 4K HEVC -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/5.0.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/5.0.5/controls.min.css">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 1200px;
        }
        select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #333;
            color: white;
            border: 2px solid #ff9000;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        h1 {
            color: #ff9000;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Multi-Stream UHD Player (con Fix Eurosport 4K & GPU Recovery)</h1>

    <select id="streamSelector">
        <option value="eurosport4k">EUROSPORT 4K</option>
        <option value="f1">SKY SPORTS F1 UHD</option>
        <option value="sports1">SKY SPORTS 1 UHD</option>
        <option value="sports2">SKY SPORTS 2 UHD</option>
        <option value="mainevent">SKY SPORTS MAIN EVENT UHD</option>
        <option value="tnt">TNT SPORTS ULTIMATE UHD</option>
    </select>

    <div id="video-container" data-shaka-player-container>
        <video autoplay playsinline data-shaka-player id="video" style="width:100%;height:100%"></video>
    </div>
</div>

<script>
    const streams = {
        eurosport4k: {
            manifest: 'https://timlivetu0.cb.ticdn.it/Content/DASH/Live/channel(eurosport4k)/manifest.mpd',
            keys: {"9ceae06c6ad34aada83ba86c0b511452":"406862beb4af1ef8fe04ba15d9936360","fcd924bd2e45470fa2ae50ef05e357c0":"266db84d3572bc889185274a90ff31df","dea135e33341468f8a4e8da806d8a6e6":"fb7423db39e6fab75056f8c83f415847","31911db90ee3410f8b38e45659d01fb1":"ac316ab7dfd2b50faf6d44633e4fedd5","a16f2a39adbb4974b8910cec8a651a09":"c2d55e0111af955f47214af209a2c468"}
        },
        appletv4k: {
            manifest: 'https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/dash/enc/pplmyagyhu/out/v1/6695d8753e6c4e318a0bc5c4a18de9b9/cenc.mpd',
            keys: {"eb1e6c51646986a652498a57b458d1d2":"1b278aeea7b8978fa574ad0eb52758a2"}
        },
        f1: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777711547_s~7d601a3c-76ec-4aec-940c-8c9fb7fadffd_u~391d2014ab0c633697fb1b3a46f47dfaf28470e414b6aaafb672438c19a94fc021fcb3dc21d6ad645d044df1ab39f0a3_l~60_x~12eeddf9c3adaeb3016040c0e8078deb1ad075a319231d69eab2274b0c992a3e/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsf1uhd)/master_2hr-all.mpd',
            keys: {"111cd3cd3a27a8c0aaa40d9d7815bb33": "1d13d440ab29ab027de9843ecf62facf", "111c5b96024c2a58fbc980905a0b3c73": "07ec005ab99cb0fbbce1c4d913fd941e"}
        },
        sports1: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218154_s~265f79d4-ed37-45b5-b134-a8711e75f926_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~59_x~93516c54e940660ebfb063532a82f95f95f640fa22df0e20ec4f1c763ce3b094/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skyuhdsports1)/master_2hr-all.mpd',
            keys: {"111cfb5bb437ce65bd71a0421bd2a4cf": "7c09158574cf900b64bbeb1fa6be8b64", "111c3801c329b61c7b03872eee20073c": "8506cfd7504dfaab5cc9dcd83f3c223c"}
        },
        sports2: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218149_s~df50d4a7-fff5-42a3-a2a9-02b5d680bf19_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~59_x~aa349eba73f552f9b3e4769850376ba6f2cfdafa9a1c9f5f5e6c80352fd41048/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skyuhdsports2)/master_2hr-all.mpd',
            keys: {"111c16b39b650523d7a51c07eedeef01": "87b8223de40e047a10f094d3eb02dd55", "111c5ab918fc0f7d4ed948f1e1c08846": "d61325e9bd5f38bce8503f3f11602f44"}
        },
        mainevent: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1778486282_s~a8ad9f1a-e163-4d94-b2e5-1841a3cd911c_u~3e447b32158e09dcd5ce2ee9f7cf1cb7265d39219764d876d6c533f5955119fc3facea1ae472f8a8fd9bbda0da653a27_l~67_x~d20eb898c0ed406558ab5267b92e2fc0fb4634a01b97588038b4231fca556176/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsmaineventuhd)/master_2hr-all.mpd',
            keys: {"111c25e7e37846b06c9b87f62658546e": "d30ab65c372dac38af450625169da171", "111ce0170cba6d5b3692f5b0d433e582": "74869e833e9d984df1a0d4954559187a"}
        },
        tnt: {
            manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1780242390_s~2a289cfc-6fe2-4e2c-a145-7fabc9ae84f0_u~67cff13cc551280a9e82c32fbfe589d837d692d699572fc6ef5fdceef7afb934_l~65_x~c37847153205a3f72c7cfa415b9e7bea311e53755b93ec03d0db1cf648a71221/nowgblin2/Content/CMAF_CTR_D1/Live/channel(tntsportultimateuhd)/master_2hr-all.mpd',
            keys: {"111c333e3f2dadd6cb768860aa2731f4": "cff0a15f60b2f8fc3f7132f4653dd0c1", "111c500455c487ee6d06e1ee200f2f4b": "b78ee5bd8398bd194b8f511ae39102fb"}
        }
    };

    let player = null;
    let currentStreamKey = 'eurosport4k';
    let isRecovering = false;
    let isUnloading = false;
    let lastRecoveryTime = 0;
    let playheadWatchdogInterval = null;
    let hasStartedPlaying = false;

    function startPlayheadWatchdog() {
        clearInterval(playheadWatchdogInterval);
        let lastPlayheadTime = -1;
        let stallCount = 0;
        
        playheadWatchdogInterval = setInterval(() => {
            const videoEl = document.getElementById('video');
            if (!videoEl || !player) return;
            
            if (document.hidden) {
                stallCount = 0;
                return;
            }

            if (hasStartedPlaying && !videoEl.paused && !videoEl.ended && !isRecovering && videoEl.readyState >= 3) {
                const currentTime = videoEl.currentTime;
                if (currentTime === lastPlayheadTime) {
                    stallCount++;
                    console.warn('warning playhead fermo conto ' + stallCount + ' di 6 time ' + currentTime.toFixed(2));
                    if (stallCount >= 6) {
                        console.error('stallo totale di 12 secondi avvio recovery gpu');
                        stopPlayheadWatchdog();
                        handleAutoRecovery({
                            code: 3016,
                            category: 3,
                            severity: 2,
                            message: 'stallo watchdog',
                            fromWatchdog: true
                        });
                    }
                } else {
                    stallCount = 0;
                    lastPlayheadTime = currentTime;
                }
            } else {
                stallCount = 0;
            }
        }, 2000);
        console.log('watchdog avviato');
    }

    function stopPlayheadWatchdog() {
        clearInterval(playheadWatchdogInterval);
        hasStartedPlaying = false;
        console.log('watchdog fermato');
    }

    function onPlaying() {
        console.log('video playing avvio watchdog');
        hasStartedPlaying = true;
        startPlayheadWatchdog();
    }

    async function domTeardownRecovery() {
        console.log('recovery svuoto dom e resetto video gpu');
        stopPlayheadWatchdog();
        isRecovering = true;
        
        const wasFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
        
        const origExitFullscreen = document.exitFullscreen;
        const origWebkitExitFullscreen = document.webkitExitFullscreen;
        const origMozCancelFullScreen = document.mozCancelFullScreen;
        const origMsExitFullscreen = document.msExitFullscreen;
        const noop = () => { console.log('ignoro exit fullscreen temporaneo'); };
        
        try {
            if (document.exitFullscreen) document.exitFullscreen = noop;
            if (document.webkitExitFullscreen) document.webkitExitFullscreen = noop;
            if (document.mozCancelFullScreen) document.mozCancelFullScreen = noop;
            if (document.msExitFullscreen) document.msExitFullscreen = noop;
        } catch (e) {}
        
        const containerEl = document.getElementById('video-container');
        const oldVideo = document.getElementById('video');

        let playerDestroyedByUi = false;
        if (oldVideo && oldVideo['ui']) {
            try {
                console.log('distruggo ui vecchia');
                const oldUi = oldVideo['ui'];
                oldVideo['ui'] = null;
                await Promise.race([
                    oldUi.destroy(),
                    new Promise(resolve => setTimeout(resolve, 1000))
                ]);
                playerDestroyedByUi = true;
                console.log('ui vecchia andata');
            } catch (err) {
                console.warn('errore nel buttare la ui ' + err.message);
            }
        }

        if (player && !playerDestroyedByUi) {
            try {
                console.log('distruggo player vecchio');
                const playerToDestroy = player;
                player = null;
                await Promise.race([
                    playerToDestroy.destroy(),
                    new Promise(resolve => setTimeout(resolve, 1000))
                ]);
                console.log('player vecchio andato');
            } catch (err) {
                console.warn('errore nel buttare il player ' + err.message);
            }
        }
        
        try {
            if (origExitFullscreen) document.exitFullscreen = origExitFullscreen;
            if (origWebkitExitFullscreen) document.webkitExitFullscreen = origWebkitExitFullscreen;
            if (origMozCancelFullScreen) document.mozCancelFullScreen = origMozCancelFullScreen;
            if (origMsExitFullscreen) document.msExitFullscreen = origMsExitFullscreen;
        } catch (e) {}
        
        if (containerEl) {
            const oldControls = containerEl.querySelectorAll('.shaka-controls-container');
            oldControls.forEach(el => el.remove());
        }
        
        if (oldVideo) {
            oldVideo.removeAttribute('src');
            oldVideo.load();
            oldVideo.remove();
            console.log('video tag rimosso aspetto 1.5s');
            await new Promise(resolve => setTimeout(resolve, 1500));
        }
        
        const newVideo = document.createElement('video');
        newVideo.id = 'video';
        newVideo.className = 'shaka-video';
        newVideo.autoplay = true;
        newVideo.playsInline = true;
        newVideo.style.width = '100%';
        newVideo.style.height = '100%';
        if (containerEl) containerEl.appendChild(newVideo);
        newVideo.setAttribute('data-shaka-player', '');
        newVideo.addEventListener('playing', onPlaying);
        console.log('nuovo tag video pronto');
        
        player = new shaka.Player();
        registerEvents(player);
        
        await player.attach(newVideo).catch(err => console.error('errore attach ' + err));
        
        try {
            const newUi = new shaka.ui.Overlay(player, containerEl, newVideo);
            newUi.configure({ clearBufferOnQualityChange: true });
            newVideo['ui'] = newUi;
            console.log('nuova ui pronta');
        } catch (err) {
            console.error('errore ui init ' + err);
        }
        
        isRecovering = false;
        await loadStream(currentStreamKey, true, wasFullscreen);
    }

    function handleAutoRecovery(e) {
        if (!e) return;
        if (typeof e === 'object') e.handled = true;
        if (isUnloading || isRecovering || (e && e.code === 1008)) return;
        if (e && e.severity === 1) return;

        const now = Date.now();
        if (now - lastRecoveryTime < 1500) return;
        lastRecoveryTime = now;

        const is4K = currentStreamKey === 'eurosport4k' || currentStreamKey === 'f1' || currentStreamKey === 'sports1' || currentStreamKey === 'sports2' || currentStreamKey === 'mainevent' || currentStreamKey === 'tnt';
        const isTim4K = currentStreamKey === 'eurosport4k';

        console.warn('errore intercettato codice ' + e.code + ' cat ' + e.category + ' msg ' + e.message);

        if (e.code === 3016 || e.code === 3015 || e.code === 3014 || e.code === 244002 || e.category === 3 || e.category === 7) {
            window.__shakaRetries = (window.__shakaRetries || 0) + 1;
            
            if (is4K || isTim4K || e.code === 3016 || e.code === 244002 || window.__shakaRetries >= 2) {
                console.warn('errore decoder gpu o stallo persistente su 4k dom recovery');
                domTeardownRecovery();
            } else {
                console.warn('errore non bloccante ricarico stream tentativi ' + window.__shakaRetries);
                loadStream(currentStreamKey);
            }
        }
    }

    function registerEvents(targetPlayer) {
        targetPlayer.addEventListener('error', (event) => {
            const error = event.detail;
            if (error) {
                error.handled = true;
                handleAutoRecovery(error);
            }
        });

        targetPlayer.addEventListener('buffering', (event) => {
            console.log('buffering ' + (event.buffering ? 'start' : 'stop'));
        });
    }

    async function loadStream(streamKey, isFromRecovery = false, preserveFullscreen = false) {
        if (!isFromRecovery && isRecovering) return;
        currentStreamKey = streamKey;
        const stream = streams[streamKey];
        if (!stream) return;

        const video = document.getElementById('video');
        if (!video || !player) return;

        console.log('carico ' + streamKey);

        const is4K = true;
        const isTim4K = streamKey === 'eurosport4k' || stream.manifest.includes('ticdn.it');

        const playerConfig = {
            drm: {
                clearKeys: stream.keys
            },
            preferredAudioLanguage: 'it',
            preferredTextLanguage: 'it',
            preferredVideoCodecs: ['av01', 'vp9', 'hev1', 'hvc1', 'avc1'],
            preferredAudioChannelCount: 2,
            manifest: {
                defaultPresentationDelay: isTim4K ? 12 : 0,
                dash: {
                    clockSyncUri: 'https://time.akamai.com/?iso',
                    ignoreMinBufferTime: false,
                    autoCorrectDrift: !isTim4K,
                    ignoreSuggestedPresentationDelay: isTim4K,
                    sequenceMode: isTim4K
                }
            },
            mediaSource: {
                codecSwitchingStrategy: shaka.config.CodecSwitchingStrategy.RELOAD
            },
            streaming: {
                segmentPrefetchLimit: 0,
                stallEnabled: true,
                stallThreshold: 1,
                stallSkip: 0.1,
                bufferingGoal: isTim4K ? 4 : 8,
                rebufferingGoal: isTim4K ? 2 : 2,
                bufferBehind: isTim4K ? 0 : 30,
                evictionGoal: isTim4K ? 2 : 1,
                gapDetectionThreshold: 10,
                inaccurateManifestTolerance: 10,
                updateIntervalSeconds: isTim4K ? 1 : 2,
                retryParameters: {
                    maxAttempts: isTim4K ? 2 : 6,
                    baseDelay: 300,
                    backoffFactor: isTim4K ? 2 : 1.2,
                    fuzzFactor: 0.3,
                    timeout: 15000
                }
            },
            abr: {
                enabled: true,
                bandwidthUpgradeTarget: 0.85,
                switchInterval: 2,
                restrictions: {
                    minHeight: 360
                }
            }
        };

        player.configure(playerConfig);

        try {
            await player.load(stream.manifest);
            console.log('caricato ok ' + streamKey);

            if (preserveFullscreen) {
                const containerEl = document.getElementById('video-container');
                const currentFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
                if (!currentFs && containerEl) {
                    try {
                        if (containerEl.requestFullscreen) await containerEl.requestFullscreen();
                        else if (containerEl.webkitRequestFullscreen) await containerEl.webkitRequestFullscreen();
                        else if (containerEl.mozRequestFullScreen) await containerEl.mozRequestFullScreen();
                        else if (containerEl.msRequestFullscreen) await containerEl.msRequestFullscreen();
                        console.log('fullscreen rimesso');
                    } catch (fsErr) {
                        console.warn('no fullscreen ' + fsErr.message);
                    }
                }
            }

            video.play().catch(err => {
                if (isRecovering || isUnloading || (err && err.message && err.message.includes('removed'))) return;
                console.warn('play bloccato provo mutato');
                video.muted = true;
                video.play().catch(pErr => {
                    if (isRecovering || isUnloading || (pErr && pErr.message && pErr.message.includes('removed'))) return;
                    console.error('play fallito ' + pErr.message);
                });
            });

            setTimeout(() => {
                window.__shakaRetries = 0;
            }, 10000);

        } catch (e) {
            if (e.code !== 1008 && !isUnloading) {
                console.error('errore load ' + e);
                handleAutoRecovery(e);
            }
        }
    }

    async function init() {
        console.log('start player init');
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        player = controls.getPlayer();

        registerEvents(player);
        video.addEventListener('playing', onPlaying);

        document.getElementById('streamSelector').addEventListener('change', (e) => {
            loadStream(e.target.value);
        });

        await loadStream('eurosport4k');
    }

    document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
