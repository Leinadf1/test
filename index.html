<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHD TV - Custom Player con Selettore Qualità</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.compiled.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 1000px; }
        h1 { color: #ff9000; text-align: center; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .controls-row { display: flex; gap: 15px; margin-bottom: 25px; }
        select { 
            flex: 1; padding: 14px; background: #222; color: #fff; 
            border: 2px solid #ff9000; border-radius: 6px; font-size: 16px; cursor: pointer; outline: none;
        }
        select:disabled { border-color: #555; color: #777; cursor: not-allowed; }
        .video-box { width: 100%; aspect-ratio: 16/9; background-color: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.9); border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="container">
    <h1>Multi-Stream Custom Dashboard</h1>
    
    <div class="controls-row">
        <select id="channelSelector">
            <option value="f1">SKY SPORTS F1 UHD</option>
            <option value="sports1">SKY SPORTS 1 UHD</option>
            <option value="sports2">SKY SPORTS 2 UHD</option>
            <option value="mainevent">SKY SPORTS MAIN EVENT UHD</option>
            <option value="tnt">TNT SPORTS ULTIMATE UHD</option>
            <option value="eurosport4k">EUROSPORT 4K (TIMVISION)</option>
        </select>

        <select id="qualitySelector" disabled>
            <option value="auto">Qualità: Automatica</option>
        </select>
    </div>

    <div class="video-box">
        <video id="videoPlayer" controls autoplay muted></video>
    </div>
</div>

<script>
const streams = {
    f1: {
        manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777711547_s~7d601a3c-76ec-4aec-940c-8c9fb7fadffd_u~391d2014ab0c633697fb1b3a46f47dfaf28470e414b6aaafb672438c19a94fc021fcb3dc21d6ad645d044df1ab39f0a3_l~60_x~12eeddf9c3adaeb3016040c0e8078deb1ad075a319231d69eab2274b0c992a3e/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsf1uhd)/master_2hr-all.mpd',
        keys: { "111cd3cd3a27a8c0aaa40d9d7815bb33": "1d13d440ab29ab027de9843ecf62facf", "111c5b96024c2a58fbc980905a0b3c73": "07ec005ab99cb0fbbce1c4d913fd941e" }
    },
    sports1: {
        manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218154_s~265f79d4-ed37-45b5-b134-a8711e75f926_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~59_x~93516c54e940660ebfb063532a82f95f95f640fa22df0e20ec4f1c763ce3b094/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skyuhdsports1)/master_2hr-all.mpd',
        keys: { "111cfb5bb437ce65bd71a0421bd2a4cf": "7c09158574cf900b64bbeb1fa6be8b64", "111c3801c329b61c7b03872eee20073c": "8506cfd7504dfaab5cc9dcd83f3c223c" }
    },
    sports2: {
        manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218149_s~df50d4a7-5fff-42a3-a2a9-02b5d680bf19_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~59_x~aa349eba73f552f9b3e4769850376ba6f2cfdafa9a1c9f5f5e6c80352fd41048/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skyuhdsports2)/master_2hr-all.mpd',
        keys: { "111c16b39b650523d7a51c07eedeef01": "87b8223de40e047a10f094d3eb02dd55", "111c5ab918fc0f7d4ed948f1e1c08846": "d61325e9bd5f38bce8503f3f11602f44" }
    },
    mainevent: {
        manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1778486282_s~a8ad9f1a-e163-4d94-b2e5-1841a3cd911c_u~3e447b32158e09dcd5ce2ee9f7cf1cb7265d39219764d876d6c533f5955119fc3facea1ae472f8a8fd9bbda0da653a27_l~67_x~d20eb898c0ed406558ab5267b92e2fc0fb4634a01b97588038b4231fca556176/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsmaineventuhd)/master_2hr-all.mpd',
        keys: { "111c25e7e37846b06c9b87f62658546e": "d30ab65c372dac38af450625169da171", "111ce0170cba6d5b3692f5b0d433e582": "74869e833e9d984df1a0d4954559187a" }
    },
    tnt: {
        manifest: 'https://g006-lin-ie-cmaf-prd-ak.pcdn05.cssott02.com/v~a-0-0_e~1777218148_s~3c04d9eb-0182-41c8-839b-4642c3f270b3_u~8ce0aa87875a2e53897aa559530193d95e063ecc5caf48221b529f01787c9f96b320501b87b632648bb42ce18911ea1a_l~65_x~ea6fc938e2b8183c42f657473c8d7942d45f3c931e32dc3d255d2f64c075a0af/nowgblin1/Content/CMAF_CTR_D1/Live/channel(tntsportultimateuhd)/master_2hr-all.mpd',
        keys: { "111c36e35a0406b150ba557d489606aa": "4d1144b896229503f3f84e6b8764220d", "111c8504f18d1648ff8a82d78178e55c": "539435e7a6d369d51de51d04cbc842f2" }
    },
    eurosport4k: {
        manifest: 'https://timlivetu0.cb.ticdn.it/Content/DASH/Live/channel(eurosport4k)/manifest.mpd',
        keys: { "9ceae06c6ad34aada83ba86c0b511452":"406862beb4af1ef8fe04ba15d9936360","fcd924bd2e45470fa2ae50ef05e357c0":"266db84d3572bc889185274a90ff31df","dea135e33341468f8a4e8da806d8a6e6":"fb7423db39e6fab75056f8c83f415847","31911db90ee3410f8b38e45659d01fb1":"ac316ab7dfd2b50faf6d44633e4fedd5","a16f2a39adbb4974b8910cec8a651a09":"c2d55e0111af955f47214af209a2c468" }
    }
};

let shakaPlayer = null;
let videoEl = null;

async function switchChannel(channelKey) {
    const targetData = streams[channelKey];
    if (!targetData) return;

    // Svuota e disabilita il menu qualità durante il caricamento del nuovo canale
    const qualitySelector = document.getElementById('qualitySelector');
    qualitySelector.innerHTML = '<option value="auto">Qualità: Automatica</option>';
    qualitySelector.disabled = true;

    shakaPlayer.configure({
        drm: {
            clearKeys: targetData.keys,
            servers: {},
            advanced: {
                'org.w3.org.clearkey': {
                    'distinctiveIdentifierRequired': false,
                    'persistentStateRequired': false,
                    'videoRobustness': '',
                    'audioRobustness': ''
                }
            }
        },
        manifest: { dash: { clockSyncUri: '' } }
    });

    try {
        await shakaPlayer.load(targetData.manifest);
        console.log("Flusso agganciato!");
        // Una volta caricato lo stream, popoliamo il menu delle qualità
        populateQualityMenu();
    } catch (error) {
        console.error("Errore Shaka:", error.code, error);
    }
}

function populateQualityMenu() {
    const qualitySelector = document.getElementById('qualitySelector');
    
    // Recupera tutte le tracce disponibili (escludendo quelle solo audio)
    const tracks = shakaPlayer.getVariantTracks();
    
    // Ordina le tracce dalla risoluzione più alta a quella più bassa
    tracks.sort((a, b) => b.height - a.height);

    // Filtra per evitare risoluzioni doppie nel menu (es. se ci sono tracce con audio diversi)
    const seenHeights = new Set();

    tracks.forEach((track) => {
        if (track.height && !seenHeights.has(track.height)) {
            seenHeights.add(track.height);
            const option = document.createElement('option');
            option.value = track.id;
            
            // Etichetta carina per identificare il 4K rispetto al Full HD
            let label = `${track.height}p (${track.width}x${track.height})`;
            if (track.height >= 2160) label += ' [UHD/4K]';
            else if (track.height >= 1080) label += ' [Full HD]';
            
            option.textContent = label;
            qualitySelector.appendChild(option);
        }
    });

    if (seenHeights.size > 0) {
        qualitySelector.disabled = false;
    }
}

async function initPlayer() {
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert('Browser non supportato!');
        return;
    }

    videoEl = document.getElementById('videoPlayer');
    shakaPlayer = new shaka.Player(videoEl);

    shakaPlayer.addEventListener('error', (event) => {
        console.error('Shaka Error:', event.detail);
    });

    await switchChannel('f1');

    // Listener Cambio Canale
    document.getElementById('channelSelector').addEventListener('change', async (e) => {
        await switchChannel(e.target.value);
    });

    // Listener Cambio Qualità manuale
    document.getElementById('qualitySelector').addEventListener('change', (e) => {
        const value = e.target.value;
        if (value === 'auto') {
            // Riabilita l'Abitration (Adattamento automatico di Shaka in base alla banda)
            shakaPlayer.configure({ abr: { enabled: true } });
            console.log("Qualità impostata su: Automatica");
        } else {
            // Disattiva l'Avanzamento automatico per forzare la traccia scelta dall'utente
            shakaPlayer.configure({ abr: { enabled: false } });
            
            const trackId = parseInt(value, 10);
            const tracks = shakaPlayer.getVariantTracks();
            const selectedTrack = tracks.find(t => t.id === trackId);
            
            if (selectedTrack) {
                shakaPlayer.selectVariantTrack(selectedTrack, /* clearBuffer= */ true);
                console.log(`Qualità bloccata su: ${selectedTrack.height}p`);
            }
        }
    });
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
