let player;

async function loadStream(streamKey) {
    const stream = streams[streamKey];
    player.configure({
        drm: { clearKeys: stream.keys }
    });
    try {
        await player.unload(); // Pulisce il player prima di caricare il nuovo stream
        await player.load(stream.manifest);
        console.log("Caricato:", streamKey);
    } catch (e) {
        console.error("Errore caricamento:", e);
    }
}

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const controls = ui.getControls();
    player = controls.getPlayer();

    // FILTRO DI RETE PER ELEVEN SPORTS
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.allowCrossOrigin = true;
        // Simula Smart TV e rimuove referer per bypassare i blocchi dei server polacchi
        request.headers['User-Agent'] = 'Mozilla/5.0 (Web0S; Linux/SmartTV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.5735.199 Safari/537.36';
        delete request.headers['Origin'];
        delete request.headers['Referer'];
    });

    // Carica il primo canale di default
    loadStream('f1');

    // Listener per il cambio canale
    document.getElementById('streamSelector').addEventListener('change', (e) => {
        loadStream(e.target.value);
    });
}

document.addEventListener('shaka-ui-loaded', init);
