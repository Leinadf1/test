<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <title>F1 Live Stream - Debug Mode</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">

    <style>
      body {
        background-color: #1a1a1a;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        width: 90%;
        max-width: 900px;
        margin-top: 30px;
      }
      #status-log {
        background: #333;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        font-family: monospace;
        font-size: 12px;
        color: #00ff00;
        border: 1px solid #555;
      }
      .error-msg { color: #ff4d4d; }
      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: black;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Shaka Player – F1 Live</h2>
      
      <div id="status-log">Inizializzazione sistema...</div>

      <div
        data-shaka-player-container
        style="box-shadow: 0 10px 30px rgba(0,0,0,0.5);"
      >
        <video autoplay data-shaka-player id="video"></video>
      </div>
    </div>

    <script>
      const logElement = document.getElementById('status-log');
      
      function updateLog(msg, isError = false) {
        logElement.innerHTML = isError ? `<span class="error-msg">ERRORE: ${msg}</span>` : msg;
        console.log(msg);
      }

      const streamConfig = {
        manifest: 'https://ott-video-cf.formula1.com/v2/pa_cGF0aDolMkZoYWp2azJmZDJ2eHIlMkZvdXQlMkZ2MSUyRk1haW4lMkZQcmVzZW50YXRpb24tUjElMkZIRFItVUhELUhMUy1DbGVhcktleXxraWQ6MTA0MnxleHA6MTc3Mjk0NTE1NHx0dGw6MTQ0MHxnZW86SU58c3RyZWFtVHlwZTpIRFJfVUhEX0hMU0NLfHNlc3Npb25JZDoyMTcyODczNDhfMDFLSzM5VkdaM0Y2MVEyMThNNU4zUDI4RlpfUFB8c3RhcnQ6MjAyNi0wMy0wN1QwNDo0MDoxOC0wMDowMHxlbmQ6MjAyNi0wMy0wN1QxNjo0MDoxOC0wMDowMHx0b2tlbjpaamZheXoyfjJ0aGM3M2xFRUlObVNvZlROdVJ6bjhVSHVEWHl6dGhEQ0Y4Xw__/hajvk2fd2vxr/out/v1/Main/Presentation-R1/HDR-UHD-HLS-ClearKey/index.m3u8?end=2026-03-07T16:40:18-00:00&start=2026-03-07T04:40:18-00:00',
        
        clearKeys: {
          "05ff63306c16366b946695bb87858c5d": "8cc2da0fed19a863e573808a71119c19"
        }
      };

      async function init() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        const player = controls.getPlayer();

        // Configurazione Shaka
        player.configure({
          drm: { clearKeys: streamConfig.clearKeys },
          streaming: {
            jumpLargeGaps: true,
            lowLatencyMode: true
          }
        });

        // Ascolta gli errori del player
        player.addEventListener('error', (e) => {
          updateLog(`Codice Errore ${e.detail.code} (${e.detail.severity === 2 ? 'Critico' : 'Info'})`, true);
        });

        try {
          updateLog("Caricamento manifest in corso...");
          // Specifichiamo esplicitamente il tipo MIME per HLS
          await player.load(streamConfig.manifest, null, 'application/x-mpegurl');
          updateLog("Stream caricato! Se vedi nero, controlla la VPN India.");
        } catch (e) {
          updateLog(`Caricamento fallito: ${e.code}`, true);
          if(e.code === 1001) updateLog("Errore 1001: Link scaduto o IP bloccato dal server F1.", true);
        }
      }

      document.addEventListener('shaka-ui-loaded', init);
      document.addEventListener('shaka-ui-load-failed', () => updateLog("Errore caricamento libreria UI", true));
    </script>
  </body>
</html>
