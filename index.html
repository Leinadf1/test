<!DOCTYPE html>
<html>
  <head>
    <meta charset="ISO-8859-1">
    <title>Single Stream Player</title>

    <!-- Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">

    <style>
      body {
        background-color: #262626;
        color: white;
        font-family: Arial, sans-serif;
      }
      .center {
        margin: auto;
        width: 50%;
        text-align: center;
      }
      video {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div class="center">
      <h2>Shaka Player – Single Stream</h2>
    </div>

    <div
      class="center"
      style="max-width:40em"
      data-shaka-player-container
      data-shaka-player-cast-receiver-id="07AEE832"
    >
      <video autoplay data-shaka-player id="video"></video>
    </div>

    <script>
      const stream = {
        manifest: 'https://ott-video-cf.formula1.com/v2/pa_cGF0aDolMkZoYWp2azJmZDJ2eHIlMkZvdXQlMkZ2MSUyRk1haW4lMkZQcmVzZW50YXRpb24tUjF8a2lkOjEwNDJ8ZXhwOjE3NzI5NDU5NDh8dHRsOjE0NDB8Z2VvOklOfHN0cmVhbVR5cGU6U0RSX0hEX0NNQUZXVnxzZXNzaW9uSWQ6MjE3Mjg3MzQ4XzAxS0szQUtSMEQ1MzEyUTVKVk44QzQ1MkE4X1BQfHN0YXJ0OjIwMjYtMDMtMDdUMDQ6NTU6MDMtMDA6MDB8ZW5kOjIwMjYtMDMtMDdUMTY6NTU6MDMtMDA6MDB8dG9rZW46RUFLVjBCRFNTSnRISklab25LZElXSC1BT2N-VG4wVjVQLTZNbGZCUWFnb18_/hajvk2fd2vxr/out/v1/Main/Presentation-R1/SDR-HD-CMAF-WV/index.m3u8?end=2026-03-07T16:55:03-00:00&start=2026-03-07T04:55:03-00:00',

        clearKeys: {
     "05ff63306c16366b946695bb87858c5d:8cc2da0fed19a863e573808a71119c19" ,
        }
      };

      async function init() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        const player = controls.getPlayer();

        player.addEventListener('error', e =>
          console.error('Player error:', e.detail)
        );

        player.configure({
          drm: {
            clearKeys: stream.clearKeys
          }
        });

        try {
          await player.load(stream.manifest);
          console.log('Stream caricato con successo');
        } catch (e) {
          console.error('Errore nel caricamento:', e);
        }
      }

      document.addEventListener('shaka-ui-loaded', init);
      document.addEventListener(
        'shaka-ui-load-failed',
        () => console.error('Errore caricamento Shaka UI')
      );
    </script>
  </body>
</html>
