<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <title>F1 Live - Shaka Player</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">

    <style>
      body {
        background-color: #1a1a1a;
        color: white;
        font-family: sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        width: 95%;
        max-width: 1000px;
        margin-top: 20px;
      }
      #status-log {
        background: #2a2a2a;
        padding: 12px;
        margin-bottom: 15px;
        border-left: 5px solid #e10600; /* Rosso F1 */
        font-family: monospace;
        font-size: 13px;
        color: #00ff41;
      }
      .error-text { color: #ff3333; font-weight: bold; }
      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: black;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2 style="text-align: center;">F1 Stream - Player Corretto</h2>
      
      <div id="status-log">Inizializzazione in corso...</div>

      <div data-shaka-player-container style="box-shadow: 0 4px 15px rgba(0,0,0,0.8);">
        <video autoplay data-shaka-player id="video"></video>
      </div>
    </div>

    <script>
      const logBox = document.getElementById('status-log');
      
      function printLog(msg, error = false) {
        logBox.innerHTML = error ? `<span class="error-text">ERRORE: ${msg}</span>` : msg;
        console.log(msg);
      }

      const config = {
        // Link del manifest con token
        manifest: 'https://ott-video-cf.formula1.com/v2/pa_cGF0aDolMkZoYWp2azJmZDJ2eHIlMkZvdXQlMkZ2MSUyRk1haW4lMkZQcmVzZW50YXRpb24tUjElMkZIRFItVUhELUhMUy1DbGVhcktleXxraWQ6MTA0MnxleHA6MTc3Mjk0NTE1NHx0dGw6MTQ0MHxnZW86SU58c3RyZWFtVHlwZTpIRFJfVUhEX0hMU0NLfHNlc3Npb25JZDoyMTcyODczNDhfMDFLSzM5VkdaM0Y2MVEyMThNNU4zUDI4RlpfUFB8c3RhcnQ6MjAyNi0wMy0wN1QwNDo0MDoxOC0wMDowMHxlbmQ6MjAyNi0wMy0wN1QxNjo0MDoxOC0wMDowMHx0b2tlbjpaamZheXoyfjJ0aGM3M2xFRUlObVNvZlROdVJ6bjhVSHVEWHl6dGhEQ0Y4Xw__/hajvk2fd2vxr/out/v1/Main/Presentation-R1/HDR-UHD-HLS-ClearKey/index.m3u8?end=2026-03-07T16:40:18-00:00&start=2026-03-07T04:40:18-00:00',
        
        // Chiavi decrittazione corrette (KID: KEY)
        clearKeys: {
          "05ff63306c16366b946695bb87858c5d": "8cc2da0fed19a863e573808a71119c19"
        }
      };

      async function startPlayer() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        const player = controls.getPlayer();

        // Configurazione avanzata per stabilità
        player.configure({
          drm: {
            clearKeys: config.clearKeys
          },
          streaming: {
            jumpLargeGaps: true,      // Salta i buchi nel video per evitare il caricamento infinito
            forceTransmuxTS: true,    // Necessario per alcuni flussi HLS Apple
            dispatchAllEmsgBoxes: true
          },
          manifest: {
            retryParameters: { maxAttempts: 4, timeout: 20000 }
          }
        });

        // Gestione degli errori specifica
        player.addEventListener('error', (event) => {
          const error = event.detail;
          if (error.code === 1001) {
            printLog("1001 (Manifest scaduto o VPN bloccata)", true);
          } else if (error.code === 6007) {
            printLog("6007 (Problema Chiavi DRM)", true);
          } else {
            printLog(`Codice Errore ${error.code}`, true);
          }
        });

        try {
          printLog("Connessione al server F1 in corso...");
          // Caricamento forzato come HLS
          await player.load(config.manifest, null, 'application/x-mpegurl');
          printLog("Stream caricato correttamente! Premi Play se non parte.");
        } catch (e) {
          printLog("Caricamento fallito. Controlla se il link è ancora valido.", true);
        }
      }

      document.addEventListener('shaka-ui-loaded', startPlayer);
    </script>
  </body>
</html>
