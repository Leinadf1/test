    <div id="video-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video" style="width:100%;height:100%"></video>
    </div>
</div>

<script>

        keys: { "111c16b39b650523d7a51c07eedeef01": "87b8223de40e047a10f094d3eb02dd55", "111c5ab918fc0f7d4ed948f1e1c08846": "d61325e9bd5f38bce8503f3f11602f44" }

        keys: { "111c25e7e37846b06c9b87f62658546e": "d30ab65c372dac38af450625169da171", "111ce0170cba6d5b3692f5b0d433e582": "74869e833e9d984df1a0d4954559187a" }
    },
    tnt: {

        keys: { "111c36e35a0406b150ba557d489606aa": "4d1144b896229503f3f84e6b8764220d", "111c8504f18d1648ff8a82d78178e55c": "539435e7a6d369d51de51d04cbc842f2" }

    eurosport4k: {

        keys: { "9ceae06c6ad34aada83ba86c0b511452":"406862beb4af1ef8fe04ba15d9936360","fcd924bd2e45470fa2ae50ef05e357c0":"266db84d3572bc889185274a90ff31df","dea135e33341468f8a4e8da806d8a6e6":"fb7423db39e6fab75056f8c83f415847","31911db90ee3410f8b38e45659d01fb1":"ac316ab7dfd2b50faf6d44633e4fedd5","a16f2a39adbb4974b8910cec8a651a09":"c2d55e0111af955f47214af209a2c468" },
    }
};

let player;
let currentActiveKey = 'f1'; 
let isRecovering = false;

let lastPlayheadPosition = 0;
let stallCounter = 0;
let watchdogInterval;

// HARD RESET: Forza l'inizializzazione da zero pulendo l'ambiente
async function forceHardResetPlayer() {
    if (isRecovering) return;
    isRecovering = true;
    
    console.log("💥 [HARD RESET] Tabula rasa del player per sbloccare " + currentActiveKey);
    stallCounter = 0;

    const video = document.getElementById('video');
    
    try {
        if (player) {
            await player.destroy();
        }
    } catch (e) {
        console.warn("Errore durante la distruzione del vecchio player, procedo comunque:", e);
    }

    // Ripristina il tag video nativo pulendo buffer corrotti
    video.src = '';
    video.load();

    // Ricostruisci Shaka Player da zero sul tag video pulito
    player = new shaka.Player(video);
    
    player.addEventListener('error', (event) => {
        console.error('Nuovo Shaka Player Errore:', event.detail);
        forceHardResetPlayer();
    });

    await executeStreamLoad();
}

async function executeStreamLoad() {
    const stream = streams[currentActiveKey];
    const video = document.getElementById('video');

    // Configurazione calibrata per flussi UHD pesanti
    player.configure({
        drm: { clearKeys: stream.keys },
        streaming: {
            rebufferingGoal: 3, // Tollera fino a 3 secondi di accumulo dati prima di ripartire
            bufferingGoal: 12,  // Tiene un buffer più profondo di 12 secondi per evitare buchi
            jumpLargeGaps: true,
            safeSeekOffset: 5
        }
    });

    try {
        await player.load(stream.manifest);
        console.log("🚀 Canale ricostruito e pronto:", currentActiveKey);

        video.muted = true; 
        
        let playPromise = video.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                setTimeout(() => {
                    video.muted = false;
                    if (player && player.getMediaElement()) {
                        player.getMediaElement().muted = false;
                    }
                    isRecovering = false;
                    stallCounter = 0;
                }, 150); 
            }).catch(async (err) => {
                console.error("Autoplay bloccato duro dal browser. Tento l'ultimo bypass...");
                video.muted = true;
                await video.play();
                isRecovering = false;
            });
        }
    } catch (e) {
        console.error("Fallito anche il caricamento d'emergenza:", e);
        isRecovering = false;
        setTimeout(() => forceHardResetPlayer(), 3000);
    }
}

// Watchdog temporale ricalibrato: aspetta 6 secondi di blocco effettivo prima di agire
function initWatchdog() {
    if(watchdogInterval) clearInterval(watchdogInterval);
    const video = document.getElementById('video');

    watchdogInterval = setInterval(() => {
        if (isRecovering || video.paused) return;

        if (video.currentTime === lastPlayheadPosition) {
            stallCounter++;
            console.log(`⏱️ Sospetto stallo... (${stallCounter}/6)`);
            // Alzato a 6 secondi per evitare falsi positivi durante il normale buffering UHD
            if (stallCounter >= 6) {
                forceHardResetPlayer();
            }
        } else {
            stallCounter = 0; 
        }
        lastPlayheadPosition = video.currentTime;
    }, 1000);
}

async function init() {
    const video = document.getElementById('video');
    
    const ui = video['ui'];
    const controls = ui.getControls();
    player = controls.getPlayer();

    video.addEventListener('waiting', () => {
        setTimeout(() => {
            if (video.readyState < 3 && !isRecovering) {
                console.log("🚨 Evento 'waiting' prolungato rilevato.");
                forceHardResetPlayer();
            }
        }, 5000); // Alzato anche il timeout dell'evento nativo
    });

    video.addEventListener('playing', () => {
        stallCounter = 0;
        isRecovering = false;
        video.muted = false;
    });

    player.addEventListener('error', (event) => {
        console.error('Shaka Errore Iniziale:', event.detail);
        forceHardResetPlayer();
    });

    initWatchdog();

    // Carica il canale iniziale standard
    const defaultChannel = 'f1';
    currentActiveKey = defaultChannel;
    player.configure({ drm: { clearKeys: streams[defaultChannel].keys } });
    await player.load(streams[defaultChannel].manifest);

    // Gestione cambio canale manuale
    document.getElementById('streamSelector').addEventListener('change', async (e) => {
        stallCounter = 0;
        isRecovering = false;
        currentActiveKey = e.target.value;
        forceHardResetPlayer();
    });
}

document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
